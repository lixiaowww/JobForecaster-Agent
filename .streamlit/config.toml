[server]
headless = true
# HF Spaces embeds the app in an iframe on *.hf.space — cookies/XSRF break without these.
enableCORS = false
enableXsrfProtection = false
enableWebsocketCompression = false
fileWatcherType = "none"
baseUrlPath = ""

[client]
showErrorDetails = true

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#58a6ff"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#f0f6fc"
font = "sans serif"
