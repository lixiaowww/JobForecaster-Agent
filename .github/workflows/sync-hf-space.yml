name: Sync to Hugging Face Space

# Uploads GitHub main → HF Space (includes README.md YAML config + Dockerfile).
#
# GitHub Secret (Settings → Secrets and variables → Actions):
#   HF_TOKEN — Hugging Face Write token (created at huggingface.co, NOT GitHub)
#
# Target: https://huggingface.co/spaces/lixiaowww/JobForecaster-Agent

on:
  # Disabled 2026-07-11: HF now requires a PRO subscription to create/update
  # Docker Spaces on free cpu-basic (repos/create returns 402 Payment
  # Required). Hosting moved to Streamlit Community Cloud, which deploys
  # straight from GitHub with no separate sync step. Re-enable the push/
  # schedule triggers below if HF PRO is purchased and this Space is
  # revived; workflow_dispatch is left on so it can still be run manually.
  # push:
  #   branches: [main]
  # schedule:
  #   # 06:30 UTC — 30 min after daily-pages commits accumulated predictions,
  #   # so the HF Space mirror picks up the day's real track record.
  #   - cron: "30 6 * * *"
  workflow_dispatch:

concurrency:
  group: sync-hf-space
  cancel-in-progress: false

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify README has Hugging Face YAML config
        run: |
          head -1 README.md | grep -q '^---$' || (echo "::error::README.md must start with HF YAML frontmatter (---)" && exit 1)
          grep -q '^sdk: docker' README.md || (echo "::error::README.md must contain sdk: docker" && exit 1)
          grep -q '^app_port: 8501' README.md || (echo "::error::README.md must contain app_port: 8501" && exit 1)

      - name: Sync to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: lixiaowww/JobForecaster-Agent
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
