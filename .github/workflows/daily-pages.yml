name: Daily forecast and GitHub Pages

# Zero-cost public demo: run one cycle, publish site/, deploy to Pages.
# Secrets (optional): GROQ_API_KEY — without it, uses --mock (deterministic stub).

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write   # commit accumulated real predictions back to the repo
  pages: write
  id-token: write

concurrency:
  group: daily-pages
  cancel-in-progress: false

jobs:
  forecast-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Rolling key: a fixed key is immutable in Actions cache, so a constant
      # key would freeze the DB at its first snapshot and predictions would
      # never accumulate. A per-run key + prefix restore-keys saves a fresh
      # snapshot each day while restoring the most recent one.
      - name: Restore SQLite registry
        uses: actions/cache@v4
        with:
          path: data/forecaster.db
          key: forecaster-db-${{ github.run_id }}
          restore-keys: |
            forecaster-db-

      - name: Ensure data directory
        run: mkdir -p data site

      # HR-10: when the Actions cache expires the DB is empty, but the committed
      # predictions_live.jsonl still has the full history. Warm the DB from it
      # so the track record is never lost. Idempotent when cache is fresh.
      - name: Warm DB from committed live predictions (cache-miss recovery)
        run: python run.py warmup --config config.ci.yaml

      - name: Run forecasting cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FORECASTER_CONFIG: config.ci.yaml
        run: |
          if [ -n "$GROQ_API_KEY" ]; then
            echo "Using Groq (free tier secret)"
            python run.py once --config config.ci.yaml
          else
            echo "No GROQ_API_KEY — using mock LLM stub"
            python run.py once --config config.ci.yaml --mock
          fi

      # Persist accumulated REAL predictions back to the repo so the track
      # record survives cache eviction and is synced to the HF Space demo.
      # Mock runs (no GROQ_API_KEY) are skipped — we never commit synthetic data.
      - name: Accumulate real predictions into the repo
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "Mock mode — not committing synthetic predictions."
            exit 0
          fi
          python run.py export --config config.ci.yaml --out data/predictions_live.jsonl
          python run.py verify-export --config config.ci.yaml --out data/predictions_live.jsonl
          git add data/predictions_live.jsonl
          if git diff --cached --quiet -- data/predictions_live.jsonl; then
            echo "No prediction changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(forecast): accumulate daily real predictions"
            git push origin HEAD:main
          fi

      - name: Job query calibration loop (Phase 9)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "No GROQ_API_KEY — alias/title auto-apply only; kb_profile_new uses LLM cache if present."
          else
            echo "Groq available — kb_profile_new may call LLM for high-traffic KB gaps (≥3 log hits)."
          fi
          python run.py query-agent run --config config.yaml
          git add data/jobs_kb.json config.yaml data/radar_search_log.jsonl pending/job_calibration/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No KB/config calibration changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(query-agent): auto-apply search calibration"
            git push origin HEAD:main
          fi

      - name: Verify static site output
        run: |
          test -f site/index.html
          echo "site/index.html ready ($(wc -c < site/index.html) bytes)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
